when:
  - event: manual
  - event: cron

clone:
  git:
    image: woodpeckerci/plugin-git:2.9.2@sha256:ebde4a4d07e0e24b630082484d192890dd4f6d442d90bf5466f0763860f83652
    settings:
      lfs: false
      tags: false

steps:
  - name: sync-github-mirrors
    image: dhi.io/node:26.3.1-alpine3.23-dev@sha256:0034027d017c1fe1bca9a1788adbbb9be053d19259c4e5eb996987a27285e676
    environment:
      GITHUB_PUSH_TOKEN:
        from_secret: github_push_token
    commands:
      - apk add --no-cache ca-certificates git
      - node scripts/sync-github-mirrors.mjs
