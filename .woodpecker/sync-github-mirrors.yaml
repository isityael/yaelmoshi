when:
  - event: manual
  - event: cron

clone:
  git:
    image: woodpeckerci/plugin-git:2.9.0@sha256:1e536c0da16f8cbb35e870fb3d75fde45c85c7239225fea2209cc6990ba330e4
    settings:
      lfs: false
      tags: false

steps:
  - name: sync-github-mirrors
    image: dhi.io/node:26.2.0-alpine3.23-dev@sha256:88d721c72f82cc1522b4900750bdc7cc7191e73d5b9b5343d8e970ef4a3cf5d1
    environment:
      GITHUB_PUSH_TOKEN:
        from_secret: github_push_token
    commands:
      - apk add --no-cache ca-certificates git
      - node scripts/sync-github-mirrors.mjs
