when:
  - event: manual
    branch: main
  - event: cron
    branch: main

clone:
  git:
    image: woodpeckerci/plugin-git:2.9.0@sha256:1e536c0da16f8cbb35e870fb3d75fde45c85c7239225fea2209cc6990ba330e4
    settings:
      lfs: false
      tags: false

steps:
  - name: update-recent-writing
    image: dhi.io/node:24.16.0-alpine3.23-dev@sha256:ff8c928e76c951364ef93b180eb3d8de36f65385ec122162f8bdcf9c7def55a9
    commands:
      - node --test scripts/update-recent-writing.test.mjs
      - node scripts/update-recent-writing.mjs

  - name: push-readme
    image: dhi.io/node:24.16.0-alpine3.23-dev@sha256:ff8c928e76c951364ef93b180eb3d8de36f65385ec122162f8bdcf9c7def55a9
    environment:
      GIT_PUSH_TOKEN:
        from_secret: forgejo_profile_push_token
      GIT_PUSH_USER: m0sh1
    commands:
      - |
        if git diff --quiet -- README.md; then
          echo "README.md already has the latest writing."
          exit 0
        fi
      - git config user.name "woodpecker-profile-bot"
      - git config user.email "woodpecker@m0sh1.cc"
      - git add README.md
      - 'git commit -m "chore: update recent writing"'
      - |
        test -n "$GIT_PUSH_TOKEN"
        umask 077
        cat > "$HOME/.netrc" <<EOF
        machine git.m0sh1.cc
          login ${GIT_PUSH_USER}
          password ${GIT_PUSH_TOKEN}
        EOF
      - git push origin HEAD:main
