when:
  - event: manual
    branch: main
  - event: cron
    branch: main

clone:
  git:
    image: woodpeckerci/plugin-git:2.9.2@sha256:ebde4a4d07e0e24b630082484d192890dd4f6d442d90bf5466f0763860f83652
    settings:
      lfs: false
      tags: false

steps:
  - name: update-recent-writing
    image: dhi.io/node:26.2.0-alpine3.23-dev@sha256:88d721c72f82cc1522b4900750bdc7cc7191e73d5b9b5343d8e970ef4a3cf5d1
    commands:
      - node --test scripts/update-recent-writing.test.mjs
      - node scripts/update-recent-writing.mjs

  - name: push-readme
    image: dhi.io/node:26.2.0-alpine3.23-dev@sha256:88d721c72f82cc1522b4900750bdc7cc7191e73d5b9b5343d8e970ef4a3cf5d1
    environment:
      GIT_PUSH_TOKEN:
        from_secret: forgejo_profile_push_token
      GIT_PUSH_USER: m0sh1
    commands:
      - |
        if git diff --quiet -- README.md; then
          echo "README.md already has the latest writing."
          exit 0
        fi
      - git config user.name "woodpecker-profile-bot"
      - git config user.email "woodpecker@m0sh1.cc"
      - git add README.md
      - 'git commit -m "chore: update recent writing"'
      - |
        test -n "$GIT_PUSH_TOKEN"
        umask 077
        cat > "$HOME/.netrc" <<EOF
        machine git.m0sh1.cc
          login ${GIT_PUSH_USER}
          password ${GIT_PUSH_TOKEN}
        EOF
      - git push origin HEAD:main
